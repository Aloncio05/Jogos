<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caça-Número do Aloncinho — Jogos do Aloncinho</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="caca-numero.css">
</head>
<body class="game-page">
  <header>
    <nav class="topbar game-topbar" aria-label="Navegação">
      <a href="index.html" class="back-link">← Início</a>
      <strong class="brand">Jogos do Aloncinho</strong>
    </nav>
  </header>

  <main class="game-page-main">
    <section class="game-panel" aria-labelledby="caca-title">

      <div class="game-header">
        <div>
          <p class="eyebrow">Área Kids</p>
          <h2 id="caca-title">Caça-Número do Aloncinho</h2>
        </div>
        <span class="badge-kids">🎨 Kids</span>
      </div>

      <div class="caca-hud">
        <span id="caca-timer">⏱ 0.0s</span>
        <span id="caca-best">Melhor: --</span>
        <span id="caca-next">Próximo: <strong>1</strong></span>
      </div>

      <p class="status">Clique nos números de <strong>1 a 10</strong> em ordem crescente!</p>

      <div id="caca-arena" class="caca-arena" aria-label="Área de jogo"></div>

      <div id="caca-overlay" class="caca-overlay hidden">
        <p class="caca-over-title">🎉 Parabéns!</p>
        <p id="caca-over-time" class="caca-over-time"></p>
        <p id="caca-over-best" class="caca-over-best"></p>
        <button id="caca-restart" class="primary-button">Jogar de novo</button>
      </div>

    </section>
  </main>

  <footer class="footer">
    <p>Jogos do Aloncinho. Projeto estático para portfólio, GitHub e Vercel.</p>
  </footer>

  <script src="caca-numero.js"></script>
</body>
</html>
