<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memória do Aloncinho — Jogos do Aloncinho</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page">
  <header>
    <nav class="topbar game-topbar" aria-label="Navegação">
      <a href="index.html" class="back-link">← Início</a>
      <strong class="brand">Jogos do Aloncinho</strong>
    </nav>
  </header>

  <main class="game-page-main">
    <section class="game-panel" aria-labelledby="memory-title">
      <div class="game-header">
        <div>
          <p class="eyebrow">Jogo 02</p>
          <h2 id="memory-title">Memória do Aloncinho</h2>
        </div>
        <div class="actions">
          <button id="reset-memory" class="secondary-button" type="button">Reiniciar fase</button>
          <button id="memory-next-phase" class="secondary-button memory-next-btn" type="button" hidden>Próxima fase →</button>
        </div>
      </div>

      <div class="memory-hud">
        <div class="memory-hud-item">
          <span>Fase</span>
          <strong id="memory-phase-display">1 / 15</strong>
        </div>
        <div class="memory-hud-item" id="memory-timer-item" hidden>
          <span>Tempo</span>
          <strong id="memory-timer-display">--</strong>
        </div>
        <div class="memory-hud-item">
          <span>Movimentos</span>
          <strong id="memory-moves-display">0</strong>
        </div>
        <div class="memory-hud-item">
          <span>Pares</span>
          <strong id="memory-pairs-display">0 / 0</strong>
        </div>
      </div>

      <p id="memory-status" class="status">Encontre todos os pares para avançar de fase!</p>
      <div id="memory-board" class="memory-board" aria-label="Cartas do jogo da memória"></div>
      <div id="memory-phases-strip" class="memory-phases-strip" aria-label="Progresso das fases"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Jogos do Aloncinho. Projeto estático para portfólio, GitHub e Vercel.</p>
  </footer>

  <script src="script.js?v=12"></script>
</body>
</html>
