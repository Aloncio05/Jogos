<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon do Aloncinho — Jogos do Aloncinho</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="simon.css">
</head>
<body class="game-page">
  <header>
    <nav class="topbar game-topbar" aria-label="Navegação">
      <a href="index.html" class="back-link">← Início</a>
      <strong class="brand">Jogos do Aloncinho</strong>
    </nav>
  </header>

  <main class="game-page-main">
    <section class="game-panel" aria-labelledby="simon-title">

      <div class="game-header">
        <div>
          <p class="eyebrow">Área Kids</p>
          <h2 id="simon-title">Simon do Aloncinho</h2>
        </div>
        <span class="badge-kids">🎨 Kids</span>
      </div>

      <div class="simon-hud">
        <span id="simon-level">Nível: 1</span>
        <span id="simon-best">Melhor nível: 1</span>
      </div>

      <p id="simon-status" class="status">Pressione <strong>Iniciar</strong> para começar!</p>

      <div class="simon-grid" id="simon-grid" aria-label="Grade Simon">
        <button class="simon-pad" id="pad-red"    data-pad="0" aria-label="Vermelho"></button>
        <button class="simon-pad" id="pad-blue"   data-pad="1" aria-label="Azul"></button>
        <button class="simon-pad" id="pad-green"  data-pad="2" aria-label="Verde"></button>
        <button class="simon-pad" id="pad-yellow" data-pad="3" aria-label="Amarelo"></button>
      </div>

      <button id="simon-start" class="primary-button simon-start-btn">Iniciar</button>

      <div id="simon-overlay" class="simon-overlay hidden">
        <p class="simon-over-title">Fim de jogo!</p>
        <p id="simon-over-msg" class="simon-over-msg"></p>
        <button id="simon-restart" class="primary-button">Jogar de novo</button>
      </div>

    </section>
  </main>

  <footer class="footer">
    <p>Jogos do Aloncinho. Projeto estático para portfólio, GitHub e Vercel.</p>
  </footer>

  <script src="simon.js"></script>
</body>
</html>
