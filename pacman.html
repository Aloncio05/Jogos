<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man do Aloncinho — Jogos do Aloncinho</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page">
  <header>
    <nav class="topbar game-topbar" aria-label="Navegação">
      <a href="index.html" class="back-link">← Início</a>
      <strong class="brand">Jogos do Aloncinho</strong>
    </nav>
  </header>

  <main class="game-page-main">
    <section class="game-panel" aria-labelledby="pacman-title">
      <div class="game-header">
        <div>
          <p class="eyebrow">Jogo 05</p>
          <h2 id="pacman-title">Pac-Man do Aloncinho</h2>
        </div>
        <div class="actions">
          <button id="start-pacman" class="secondary-button" type="button">Começar</button>
          <button id="reset-pacman" class="secondary-button" type="button">Reiniciar</button>
        </div>
      </div>
      <div class="snake-hud">
        <div class="snake-hud-item">
          <span>Fase</span>
          <strong id="pac-phase-display">1 / 15</strong>
        </div>
        <div class="snake-hud-item">
          <span>Pontos</span>
          <strong id="pac-score-display">0</strong>
        </div>
        <div class="snake-hud-item">
          <span>Vidas</span>
          <strong id="pac-lives-display">3</strong>
        </div>
        <div class="snake-hud-item">
          <span>Velocidade</span>
          <strong id="pac-speed-display">Iniciante</strong>
        </div>
      </div>
      <p id="pac-status" class="status">Use as setas do teclado ou os botões para jogar.</p>
      <canvas id="pac-canvas" class="snake-canvas" width="380" height="420" tabindex="0" aria-label="Labirinto do Pac-Man"></canvas>
      <div class="direction-pad" aria-label="Controles do Pac-Man">
        <button type="button" data-pac-direction="up">↑</button>
        <button type="button" data-pac-direction="left">←</button>
        <button type="button" data-pac-direction="down">↓</button>
        <button type="button" data-pac-direction="right">→</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Jogos do Aloncinho. Projeto estático para portfólio, GitHub e Vercel.</p>
  </footer>

  <script src="script.js?v=11"></script>
</body>
</html>
